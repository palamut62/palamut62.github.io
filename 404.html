<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Sayfa Bulunamadı | Umut Çelik</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container { text-align: center; padding: 40px 24px; max-width: 500px; }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    p { color: #a1a1aa; font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      color: #fff;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.35s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
    }
    .terminal {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #22c55e;
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 32px;
      text-align: left;
    }
    .terminal .prompt { color: #6366f1; }
    .terminal .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığınız sayfaya ulaşılamadı. Yanlış bir bağlantı mı takip ettiniz?</p>
    <div class="terminal">
      <span class="prompt">$</span> curl -I https://palamut62.github.io/portfolio/<span class="error"><br>HTTP/1.1 404 Not Found</span>
    </div>
    <a href="/portfolio/" class="btn">← Ana Sayfaya Dön</a>
  </div>
</body>
</html>
